databaseChangeLog:
  - changeSet:
      id: add-is-deleted-column-to-users
      author: YKorniienkova
      changes:
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: is_deleted
                  type: BIT(1)
                  defaultValueBoolean: false
                  constraints:
                    nullable: false